server:
  http_listen_port: 9080

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: quorumproof-api
    static_configs:
      - targets: [localhost]
        labels:
          job: quorumproof-api
          __path__: /var/log/quorumproof/*.log

  - job_name: system
    static_configs:
      - targets: [localhost]
        labels:
          job: system
          __path__: /var/log/syslog
