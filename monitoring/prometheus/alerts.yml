groups:
  - name: quorumproof
    rules:
      - alert: HighErrorRate
        expr: rate(quorumproof_api_errors_total[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on QuorumProof API"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: APIDown
        expr: up{job="quorumproof-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "QuorumProof exporter is down"
          description: "The quorumproof-exporter has been unreachable for more than 1 minute."

      - alert: ContractPaused
        expr: quorumproof_contract_paused == 1
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "QuorumProof contract is paused"
          description: "The contract has been paused by an admin. Investigate before unpausing."

      - alert: LowAttestationRate
        expr: quorumproof_attestation_success_rate < 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low attestation success rate"
          description: "Attestation success rate is {{ $value | humanizePercentage }}, below 50%."

      - alert: RateLimitSpike
        expr: rate(quorumproof_rate_limit_hits_total[5m]) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Unusual rate-limit activity"
          description: "Rate limit exceeded {{ $value }} times/s over the last 5 minutes."

      # #587 — Contract health dashboard alerts
      - alert: ContractErrorBurst
        expr: increase(quorumproof_api_errors_total[10m]) > 20
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Burst of contract errors"
          description: "{{ $value }} errors in the last 10 minutes."

      # #599 — Backup verification alerts
      - alert: BackupMissing
        expr: time() - quorumproof_backup_last_success_timestamp > 90000
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "No successful backup in 25 hours"
          description: "Last successful backup was {{ $value | humanizeDuration }} ago. Expected every 24h."

      - alert: BackupVerificationFailed
        expr: quorumproof_backup_verification_status == 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Backup integrity verification failed"
          description: "The most recent backup failed integrity checks. Restore may not be possible."

      # #846 — Automated performance regression detection
      - alert: QuerySLABreach
        expr: >
          rate(quorumproof_query_sla_violations_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Query latency exceeded SLA on {{ $labels.operation }}"
          description: "Operation {{ $labels.operation }} is producing SLA violations at {{ $value | humanize }} violations/s."

      - alert: PerformanceRegressionDetected
        expr: quorumproof_performance_regression_detected == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Performance regression on {{ $labels.operation }}"
          description: "p95 latency for {{ $labels.operation }} is ≥20% above recorded baseline. Investigate recent deployments."

      - alert: HighP95Latency
        expr: >
          histogram_quantile(0.95,
            rate(quorumproof_contract_invocation_duration_seconds_bucket[10m])
          ) > on(operation) quorumproof_query_sla_threshold_seconds
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "p95 latency for {{ $labels.operation }} exceeds SLA"
          description: "p95={{ $value | humanizeDuration }} exceeds the configured SLA ceiling for {{ $labels.operation }}."
