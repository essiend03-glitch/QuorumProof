name: Disaster Recovery Drill

# #588 — Monthly automated DR testing (first day of each month at 02:00 UTC)
on:
  schedule:
    - cron: "0 2 1 * *"
  workflow_dispatch:
    inputs:
      drill_type:
        description: "Drill to run (snapshot | restore | rpc-failover | all)"
        required: false
        default: all

jobs:
  snapshot-drill:
    name: Snapshot & Verify Drill
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.drill_type == 'snapshot' || github.event.inputs.drill_type == 'all') || github.event_name == 'schedule' }}
    env:
      STELLAR_NETWORK: testnet
      STELLAR_RPC_URL: https://soroban-testnet.stellar.org
      CONTRACT_QUORUM_PROOF: ${{ secrets.DR_TEST_CONTRACT_QUORUM_PROOF }}
      CONTRACT_SBT_REGISTRY: ${{ secrets.DR_TEST_CONTRACT_SBT_REGISTRY }}
      CONTRACT_ZK_VERIFIER: ${{ secrets.DR_TEST_CONTRACT_ZK_VERIFIER }}
    steps:
      - uses: actions/checkout@v4

      - name: Install soroban CLI
        run: |
          curl -sSfL https://github.com/stellar/stellar-cli/releases/download/v21.4.0/stellar-cli-21.4.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /usr/local/bin stellar

      - name: Run snapshot
        run: ./scripts/snapshot.sh
        id: snapshot

      - name: Verify snapshot integrity
        run: |
          SNAP=$(ls -t backups/snapshots/quorumproof-*.json | head -1)
          ./scripts/verify_snapshot.sh "$SNAP"

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: dr-snapshot-${{ github.run_id }}
          path: backups/snapshots/
          retention-days: 90

  restore-drill:
    name: Restore Drill
    runs-on: ubuntu-latest
    needs: snapshot-drill
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.drill_type == 'restore' || github.event.inputs.drill_type == 'all') || github.event_name == 'schedule' }}
    env:
      STELLAR_NETWORK: testnet
      STELLAR_RPC_URL: https://soroban-testnet.stellar.org
      STELLAR_SECRET_KEY: ${{ secrets.DR_TEST_STELLAR_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install soroban CLI
        run: |
          curl -sSfL https://github.com/stellar/stellar-cli/releases/download/v21.4.0/stellar-cli-21.4.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /usr/local/bin stellar

      - name: Download snapshot artifact
        uses: actions/download-artifact@v4
        with:
          name: dr-snapshot-${{ github.run_id }}
          path: backups/snapshots/

      - name: Deploy fresh testnet contracts
        run: ./scripts/deploy_testnet.sh

      - name: Run contract tests against restored contracts
        run: ./scripts/test.sh

      - name: Verify RTO — confirm contracts respond within 5 minutes
        run: |
          START=$(date +%s)
          cargo test --test '*' -- --test-threads=1
          END=$(date +%s)
          ELAPSED=$((END - START))
          echo "Recovery time: ${ELAPSED}s"
          # RTO target: 300s (5 min)
          [[ $ELAPSED -le 300 ]] || { echo "RTO exceeded: ${ELAPSED}s > 300s"; exit 1; }

  rpc-failover-drill:
    name: RPC Failover Drill
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.drill_type == 'rpc-failover' || github.event.inputs.drill_type == 'all') || github.event_name == 'schedule' }}
    env:
      # Use fallback Horizon endpoint
      STELLAR_NETWORK: testnet
      STELLAR_RPC_URL: https://horizon-testnet.stellar.org
      CONTRACT_QUORUM_PROOF: ${{ secrets.DR_TEST_CONTRACT_QUORUM_PROOF }}
      CONTRACT_SBT_REGISTRY: ${{ secrets.DR_TEST_CONTRACT_SBT_REGISTRY }}
      CONTRACT_ZK_VERIFIER: ${{ secrets.DR_TEST_CONTRACT_ZK_VERIFIER }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Confirm fallback RPC is reachable
        run: curl -sf "$STELLAR_RPC_URL" -o /dev/null

      - name: Run tests against fallback RPC
        run: ./scripts/test.sh

  report:
    name: DR Drill Report
    runs-on: ubuntu-latest
    needs: [snapshot-drill, restore-drill, rpc-failover-drill]
    if: always()
    steps:
      - name: Summarise results
        run: |
          echo "## DR Drill Results — $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "| Drill | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Snapshot & Verify | ${{ needs.snapshot-drill.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Restore | ${{ needs.restore-drill.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| RPC Failover | ${{ needs.rpc-failover-drill.result }} |" >> $GITHUB_STEP_SUMMARY
